name: CI

on: [push, pull_request]

jobs:
  php-lint:
    name: PHP 8.1 syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: Lint all PHP files
        run: find . -name '*.php' -print0 | xargs -0 -n1 php -l
